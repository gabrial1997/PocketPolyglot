# Supabase local development config for PocketPolyglot.
# Standard local config. `project_id` is the local stack name only — it is
# NOT a hosted project ref, and nothing here is applied to any live project.
# See README.md in this folder.

project_id = "pocketpolyglot"

[api]
enabled = true
# Port the local PostgREST API is served on.
port = 54321
# Schemas exposed via the API. `extensions` is needed for some helpers.
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
# Max rows returned by a single REST/GraphQL request.
max_rows = 1000

[db]
# Port the local Postgres database is served on.
port = 54322
# Port used by `supabase db pull/diff` shadow database.
shadow_port = 54320
# Major Postgres version. Supabase hosted is on 15.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

# Inbucket catches outbound email locally (auth confirmation mails, etc.).
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Global upload size limit. Recordings bucket is created in a migration with
# its own constraints; this is just the engine ceiling.
file_size_limit = "50MiB"

# Private bucket for GDPR-sensitive voice recordings.
# Declared here for local dev; production bucket + policies are also created
# in migration 0002 so a `db push` reproduces them.
[storage.buckets.recordings]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["audio/wav", "audio/mpeg", "audio/mp4", "audio/webm", "audio/aac"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[analytics]
enabled = false

[edge_runtime]
enabled = true
# Edge Functions (the ML-service notify hook, signed-URL minting, etc.) live
# under supabase/functions/<name>/index.ts when added. SQL helpers used by the
# controller live in migrations (see functions/get_distractors.sql note).
policy = "oneshot"
